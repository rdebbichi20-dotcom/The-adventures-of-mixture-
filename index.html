<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventures of Mixture - Chapter 1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(255,0,0,0.2); image-rendering: pixelated; max-width: 100%; height: auto; }
        #overlay { position: absolute; width: 800px; height: 600px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; z-index: 10; }
        .btn { background: #8b0000; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #ff0000; }
        #puzzle-box { position: absolute; bottom: 50px; background: rgba(20, 0, 0, 0.9); padding: 20px; border: 2px solid #8b0000; display: none; text-align: center; z-index: 5; width: 400px; }
        input { background: #000; color: #ff0000; border: 1px solid #8b0000; padding: 10px; width: 80%; outline: none; text-align: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 20; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff0000; font-size: 40px;">The Adventures of Mixture</h1>
    <p id="story-text" style="font-size: 18px; line-height: 1.6; max-width: 80%;">
        كان "ميكسي" يلعب مع صديقه المفضل.. وفجأة، ساد الصمت واختفى الصديق.<br>
        لم يتبقَ سوى منزل مهجور يفوح منه الغموض.<br>
        دخل ميكسي بحثاً عن إجابات، ولكن بمجرد دخوله.. انغلق الباب خلفه بقوة!
    </p>
    <button class="btn" onclick="startGame()">ابدأ المغامرة</button>
</div>

<div id="puzzle-box">
    <p id="riddle-text" style="color: #ccc;"></p>
    <input type="text" id="answer-input" placeholder="اكتب الإجابة...">
</div>

<video id="scaryVideo" src="1000000310.mp4"></video>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const puzzleBox = document.getElementById('puzzle-box');
const riddleText = document.getElementById('riddle-text');
const answerInput = document.getElementById('answer-input');
const scaryVideo = document.getElementById('scaryVideo');

canvas.width = 800; canvas.height = 600;

const playerImg = new Image(); playerImg.src = 'player.png';
let gameStarted = false, currentRoom = 1, doorLocked = true;
let player = { x: 400, y: 550, size: 70, targetY: 550 };

const puzzles = [
    { q: "شيء له أسنان ولا يعض، ما هو؟", a: "المشط" },
    { q: "أنا خلفك دائماً ولا تلتفت، من أنا؟", a: "ظلي" },
    { q: "كلما أخذت مني كبرت، ما أنا؟", a: "الحفرة" },
    { q: "أنا أسمع بلا أذنين وأتكلم بلا لسان، فمن أنا؟", a: "الصدى" },
    { q: "يسير بلا قدمين ويدخل الأذن بلا استئذان..", a: "الصوت" },
    { q: "شيء يملكه الفقير ويحتاجه الغني وإذا أكلته تمت، ما هو؟", a: "لاشيء" }
];

function startGame() {
    overlay.style.display = 'none';
    gameStarted = true;
    requestAnimationFrame(gameLoop);
}

function drawBackground() {
    // رسم جدران المنزل المهجور
    ctx.fillStyle = currentRoom > 3 ? "#050000" : "#1a1212";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // رسم الأرضية (خشب قديم)
    ctx.strokeStyle = "#2a1a1a";
    for(let i=0; i<canvas.height; i+=40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // الباب
    ctx.fillStyle = doorLocked ? "#4b0000" : "#003300";
    ctx.fillRect(350, 20, 100, 60); 
    ctx.strokeStyle = "#ff0000";
    if(doorLocked) ctx.strokeRect(350, 20, 100, 60);
}

function gameLoop() {
    if(!gameStarted) return;
    drawBackground();

    // حركة اللاعب (سلسة)
    if (player.y > 100) player.y -= 1.5;
    else if (doorLocked) {
        puzzleBox.style.display = 'block';
        riddleText.innerText = puzzles[currentRoom - 1].q;
        answerInput.focus();
    } else {
        nextRoom();
    }

    // رسم اللاعب بظل بسيط
    ctx.shadowBlur = 15; ctx.shadowColor = "black";
    ctx.drawImage(playerImg, player.x - 35, player.y - 35, player.size, player.size);
    ctx.shadowBlur = 0;

    requestAnimationFrame(gameLoop);
}

answerInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        if (answerInput.value.trim() === puzzles[currentRoom - 1].a) {
            doorLocked = false;
            puzzleBox.style.display = 'none';
            answerInput.value = "";
        } else {
            player.y = 550; // العودة للبداية عند الخطأ
            answerInput.value = "";
        }
    }
});

function nextRoom() {
    if (currentRoom < 6) {
        currentRoom++;
        player.y = 550;
        doorLocked = true;
    } else {
        triggerEnding();
    }
}

function triggerEnding() {
    gameStarted = false;
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setTimeout(() => {
        scaryVideo.style.display = 'block';
        scaryVideo.play();
    }, 1500);
}
</script>
</body>
</html>
