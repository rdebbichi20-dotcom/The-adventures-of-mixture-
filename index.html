<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Adventures of Mixture</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: auto; background: #111; max-width: 100%; height: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 80px); grid-gap: 15px; z-index: 100; }
        .btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div id="controls">
    <div></div><div class="btn" id="up">↑</div><div></div>
    <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800; canvas.height = 1000;

// تحميل الصور
const mapImg = new Image(); 
mapImg.src = 'Sans titre 33_20260416225734.png'; 

const playerImg = new Image();
playerImg.src = 'player.png'; // تأكد أن الصورة مرفوعة بهذا الاسم تماماً

let player = { x: 380, y: 800, speed: 8, moving: null };

// برمجة اللمس للهواتف
const setupBtn = (id, dir) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); player.moving = dir; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); player.moving = null; });
};

setupBtn('up', 'up'); setupBtn('down', 'down');
setupBtn('left', 'left'); setupBtn('right', 'right');

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. رسم الخريطة
    if (mapImg.complete) {
        ctx.drawImage(mapImg, 0, 0, canvas.width, canvas.height);
    }

    // 2. تحديث الحركة
    if (player.moving === 'up' && player.y > 0) player.y -= player.speed;
    if (player.moving === 'down' && player.y < canvas.height - 70) player.y += player.speed;
    if (player.moving === 'left' && player.x > 0) player.x -= player.speed;
    if (player.moving === 'right' && player.x < canvas.width - 70) player.x += player.speed;

    // 3. رسم الشخصية
    if (playerImg.complete && playerImg.naturalWidth !== 0) {
        ctx.drawImage(playerImg, player.x, player.y, 80, 80);
    } else {
        // إذا لم تظهر الصورة، ارسم مربعاً لكي لا تتوقف اللعبة
        ctx.fillStyle = "red";
        ctx.fillRect(player.x, player.y, 40, 40);
    }
    
    requestAnimationFrame(gameLoop);
}

mapImg.onload = () => requestAnimationFrame(gameLoop);
</script>
</body>
</html>
