<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventures of Mixture - Chapter 1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: white; }
        canvas { display: block; image-rendering: pixelated; margin: auto; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 20px; pointer-events: none; text-shadow: 2px 2px #000; }
        #puzzle-box { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #444; display: none; text-align: center; }
        input { background: #222; color: #fff; border: 1px solid #777; padding: 10px; font-size: 18px; width: 200px; text-align: center; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

<div id="ui">The Adventures of Mixture: Room <span id="room-num">1</span></div>
<div id="puzzle-box">
    <p id="riddle-text"></p>
    <input type="text" id="answer-input" placeholder="اكتب الإجابة هنا...">
</div>

<canvas id="gameCanvas"></canvas>
<video id="scaryVideo" src="1000000310.mp4"></video>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const puzzleBox = document.getElementById('puzzle-box');
const riddleText = document.getElementById('riddle-text');
const answerInput = document.getElementById('answer-input');
const scaryVideo = document.getElementById('scaryVideo');

canvas.width = 800; canvas.height = 600;

// تحميل الصور
const playerImg = new Image();
playerImg.src = 'player.png'; // الصورة التي رفعتها

let currentRoom = 1;
let player = { x: 400, y: 500, size: 60 };
let doorLocked = true;

const puzzles = [
    { q: "شيء له أسنان ولا يعض، ما هو؟", a: "المشط" },
    { q: "ما هو الشيء الذي يكسر إذا نطقنا باسمه؟", a: "الصمت" },
    { q: "ما هو الشيء الذي يقرصك ولا تراه؟", a: "الجوع" },
    { q: " (رعب) من أنا؟ أنا خلفك دائماً ولا تلتفت..", a: "ظلي" },
    { q: " (رعب) تملكني مرة واحدة، وإذا فقدتني لن تعود..", a: "حياتي" },
    { q: " (رعب) شيء يأكل كل شيء، الجبال والوحوش، وإذا شبع مات..", a: "الوقت" }
];

function drawRoom() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // رسم الغرفة (تصبح أغمق مع تقدم المراحل)
    let color = currentRoom > 3 ? "#0a0000" : "#1a1a1a";
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // الباب
    ctx.fillStyle = doorLocked ? "#4d0000" : "#00ff00";
    ctx.fillRect(350, 50, 100, 10);

    // البطل (صورتك)
    if(playerImg.complete) {
        ctx.drawImage(playerImg, player.x - 30, player.y - 30, player.size, player.size);
    } else {
        ctx.fillStyle = "blue";
        ctx.fillRect(player.x - 30, player.y - 30, player.size, player.size);
    }
}

function showPuzzle() {
    puzzleBox.style.display = 'block';
    riddleText.innerText = puzzles[currentRoom - 1].q;
    answerInput.focus();
}

answerInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        if (answerInput.value === puzzles[currentRoom - 1].a) {
            doorLocked = false;
            puzzleBox.style.display = 'none';
            answerInput.value = "";
            alert("انفتح الباب!");
        } else {
            alert("خطأ! ستعود لبداية الغرفة.");
            player.y = 500;
            answerInput.value = "";
        }
    }
});

function gameLoop() {
    drawRoom();
    
    if (player.y > 100) player.y -= 1; // حركة تلقائية للأمام
    else if (doorLocked) showPuzzle();
    else {
        // الانتقال للغرفة التالية
        if (currentRoom < 6) {
            currentRoom++;
            document.getElementById('room-num').innerText = currentRoom;
            player.y = 500;
            doorLocked = true;
        } else {
            triggerEnding(); // النهاية
        }
    }
    if(currentRoom <= 6) requestAnimationFrame(gameLoop);
}

function triggerEnding() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setTimeout(() => {
        scaryVideo.style.display = 'block';
        scaryVideo.play();
    }, 1000);
}

gameLoop();
</script>
</body>
</html>
