<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Adventures of Mixture - Chapter 1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', sans-serif; touch-action: none; }
        canvas { display: block; margin: auto; background: #000; border: 2px solid #333; max-width: 100%; height: auto; }
        #controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); grid-gap: 10px; z-index: 100; }
        .btn { width: 60px; height: 60px; background: rgba(139, 0, 0, 0.6); color: white; border: 2px solid #fff; border-radius: 10px; font-size: 24px; display: flex; align-items: center; justify-content: center; user-select: none; }
        #intro-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 200; background: #000; }
    </style>
</head>
<body>

<video id="intro-video" src="1000002492.mp4" autoplay onended="startActualGame()"></video>

<div id="controls" style="display:none;">
    <div></div><div class="btn" onmousedown="move('up')" onmouseup="stop()" ontouchstart="move('up')" ontouchend="stop()">↑</div><div></div>
    <div class="btn" onmousedown="move('left')" onmouseup="stop()" ontouchstart="move('left')" ontouchend="stop()">←</div>
    <div class="btn" onmousedown="move('down')" onmouseup="stop()" ontouchstart="move('down')" ontouchend="stop()">↓</div>
    <div class="btn" onmousedown="move('right')" onmouseup="stop()" ontouchstart="move('right')" ontouchend="stop()">→</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('intro-video');
const controls = document.getElementById('controls');

canvas.width = 800; canvas.height = 1000; // مساحة الخريطة التي رسمتها

const mapImg = new Image(); mapImg.src = '1000002512.png'; // رسمة المنزل
const playerImg = new Image(); playerImg.src = 'player.png'; // صورة Mixture

let player = { x: 400, y: 900, speed: 5, moving: null };

function startActualGame() {
    video.style.display = 'none';
    controls.style.display = 'grid';
    requestAnimationFrame(gameLoop);
}

function move(dir) { player.moving = dir; }
function stop() { player.moving = null; }

function updatePlayer() {
    if (player.moving === 'up' && player.y > 0) player.y -= player.speed;
    if (player.moving === 'down' && player.y < canvas.height - 60) player.y += player.speed;
    if (player.moving === 'left' && player.x > 0) player.x -= player.speed;
    if (player.moving === 'right' && player.x < canvas.width - 60) player.x += player.speed;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // رسم خريطة المنزل
    ctx.drawImage(mapImg, 0, 0, canvas.width, canvas.height);
    
    // رسم Mixture
    ctx.drawImage(playerImg, player.x, player.y, 70, 70);
    
    updatePlayer();
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
